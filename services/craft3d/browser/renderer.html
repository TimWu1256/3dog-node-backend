<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      html, body { margin: 0; height: 100%; background: #000; }
    </style>
    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.182.0/build/three.module.min.js",
          "three/addons/": "https://unpkg.com/three@0.182.0/examples/jsm/"
        }
      }
    </script>
  </head>
  <body>
    <script type="module">
      import * as THREE from "three";
      import { GLTFLoader } from "three/addons/loaders/GLTFLoader.js";
      import { GLTFExporter } from "three/addons/exporters/GLTFExporter.js";

      window.__CRAFT3D_READY = false;

      // ─── Execute user Three.js code → GLB base64 ────────────────────────
      window.__CRAFT3D_EXECUTE_CODE = async function (jsCode) {
        const logs = [];
        const origConsole = { log: console.log, warn: console.warn, error: console.error };
        console.log = (...a) => { logs.push({ level: 'log', msg: a.map(String).join(' ') }); origConsole.log(...a); };
        console.warn = (...a) => { logs.push({ level: 'warn', msg: a.map(String).join(' ') }); origConsole.warn(...a); };
        console.error = (...a) => { logs.push({ level: 'error', msg: a.map(String).join(' ') }); origConsole.error(...a); };

        try {
          let exported = null;
          const __export = (obj) => { exported = obj; };

          const fn = new Function('THREE', 'GLTFExporter', '__export', jsCode);
          await fn(THREE, GLTFExporter, __export);

          if (!exported) {
            return { glb: null, error: '__export() was never called', logs };
          }

          const glbArrayBuffer = await new Promise((resolve, reject) => {
            const exporter = new GLTFExporter();
            exporter.parse(
              exported,
              (result) => resolve(result),
              (err) => reject(err),
              { binary: true }
            );
          });

          const bytes = new Uint8Array(glbArrayBuffer);
          let binary = '';
          for (let i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
          const glb = btoa(binary);

          return { glb, error: null, logs };
        } catch (err) {
          return { glb: null, error: String(err?.message ?? err), logs };
        } finally {
          Object.assign(console, origConsole);
        }
      };

      // ─── Render GLB from multiple camera views → data URLs ──────────────
      let renderCounter = 0;

      window.__CRAFT3D_RENDER_VIEWS = async function (glbBase64, options = {}) {
        const size = parseInt(options.size, 10) || 512;
        const backgroundColor = String(options.background || '#101010');
        const format = String(options.format || 'image/png');
        const jpegQuality = parseFloat(options.jpegQuality) || 0.92;
        const views = options.views || [];

        if (!views.length) {
          views.push({ polar: THREE.MathUtils.degToRad(90), azimuth: 0 });
        }

        const taskId = `render-${++renderCounter}`;
        const canvas = document.createElement('canvas');
        canvas.id = taskId;
        document.body.appendChild(canvas);

        try {
          const renderer = new THREE.WebGLRenderer({
            canvas,
            antialias: true,
            preserveDrawingBuffer: true,
          });
          renderer.setSize(size, size, false);
          renderer.setPixelRatio(1);
          renderer.setClearColor(backgroundColor, 1);

          const arrayBuffer = await fetch(
            'data:application/octet-stream;base64,' + glbBase64
          ).then((r) => r.arrayBuffer());

          const scene = new THREE.Scene();
          scene.add(new THREE.AmbientLight(0xffffff, 0.7));
          const dir = new THREE.DirectionalLight(0xffffff, 1.0);
          dir.position.set(3, 5, 4);
          scene.add(dir);

          const camera = new THREE.PerspectiveCamera(45, 1, 0.01, 1e6);
          const loader = new GLTFLoader();
          let gltf;
          if (loader.parseAsync) {
            gltf = await loader.parseAsync(arrayBuffer, '');
          } else {
            gltf = await new Promise((res, rej) => loader.parse(arrayBuffer, '', res, rej));
          }

          const root = gltf.scene || gltf.scenes?.[0];
          if (!root) throw new Error('GLB has no scene');
          scene.add(root);

          const box = new THREE.Box3().setFromObject(root);
          const center = new THREE.Vector3();
          const bsphere = new THREE.Sphere();
          box.getCenter(center);
          box.getBoundingSphere(bsphere);
          root.position.sub(center);

          const fovRad = THREE.MathUtils.degToRad(camera.fov);
          const distance = (bsphere.radius / Math.sin(fovRad / 2)) * 1.15;

          const out = [];
          const target = new THREE.Vector3(0, 0, 0);

          for (const v of views) {
            const spherical = new THREE.Spherical(distance, v.polar, v.azimuth);
            const pos = new THREE.Vector3().setFromSpherical(spherical);
            camera.position.copy(pos);
            camera.lookAt(target);
            camera.updateMatrixWorld(true);
            renderer.render(scene, camera);
            out.push(renderer.domElement.toDataURL(format, format === 'image/jpeg' ? jpegQuality : undefined));
          }

          try { renderer.dispose(); } catch (_) {}
          return out;
        } finally {
          document.body.removeChild(canvas);
        }
      };

      window.__CRAFT3D_READY = true;
    </script>
  </body>
</html>
