<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OpenAI Realtime API Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body class="bg-zinc-950 text-zinc-100 h-dvh flex flex-col font-sans antialiased overflow-hidden">

  <!-- ── Header ───────────────────────────────────────────────────────────── -->
  <header class="flex items-center justify-between px-4 h-12 border-b border-zinc-800 shrink-0 bg-zinc-900">
    <div class="flex items-center gap-3">
      <!-- waveform icon -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4 text-indigo-400" aria-hidden="true">
        <path d="M2 12h2l2-8 2 16 2-10 2 6 2-4 2 4 2-8 2 4h2"/>
      </svg>
      <span class="text-sm font-semibold">OpenAI Realtime API Demo</span>
      <span id="status-badge" class="inline-flex items-center gap-1.5 text-xs px-2 py-0.5 rounded-full bg-zinc-800 text-zinc-400 border border-zinc-700">
        <span class="size-1.5 rounded-full bg-zinc-500"></span>
        Disconnected
      </span>
      <button id="btn-session" title="Connect to OpenAI Realtime API"
        class="h-7 px-2.5 flex items-center gap-1.5 text-xs font-medium rounded-lg border transition-colors duration-150 bg-emerald-600/20 text-emerald-400 border-emerald-500/30 hover:bg-emerald-600/40">
        Connect
      </button>
    </div>
    <div class="flex items-center gap-2">
      <span class="text-xs text-zinc-600 font-mono" id="model-label">gpt-4o-mini-realtime-preview</span>
      <button id="btn-expand-all" title="Expand / collapse all"
        class="h-8 px-2.5 flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-100 hover:bg-zinc-800 rounded-lg transition-colors duration-150">
        <!-- chevrons icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-3.5" aria-hidden="true">
          <polyline points="7 8 12 3 17 8"/><polyline points="7 16 12 21 17 16"/>
        </svg>
        <span id="btn-expand-all-label">Expand All</span>
      </button>
      <button id="btn-clear" title="Clear log"
        class="h-8 px-2.5 flex items-center gap-1.5 text-xs text-zinc-500 hover:text-zinc-100 hover:bg-zinc-800 rounded-lg transition-colors duration-150">
        <!-- trash icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-3.5" aria-hidden="true">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
        Clear
      </button>
    </div>
  </header>

  <!-- ── Filter bar ─────────────────────────────────────────────────────── -->
  <div class="flex items-center gap-2 px-4 py-1.5 border-b border-zinc-800 shrink-0 bg-zinc-900/60 flex-wrap">
    <span class="text-xs text-zinc-600 shrink-0">Filter</span>
    <div class="w-px h-3 bg-zinc-700 shrink-0"></div>
    <button data-cat="session"     class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-300  border border-zinc-700 font-mono">session</button>
    <button data-cat="message"     class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-200  border border-zinc-700 font-mono">message</button>
    <button data-cat="text"        class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-100  border border-zinc-700 font-mono">text</button>
    <button data-cat="transcript"  class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-sky-300   border border-zinc-700 font-mono">transcript</button>
    <button data-cat="audio"       class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-violet-400 border border-zinc-700 font-mono">audio</button>
    <button data-cat="vad"         class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-teal-400  border border-zinc-700 font-mono">vad</button>
    <button data-cat="response"    class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-300  border border-zinc-700 font-mono">response</button>
    <button data-cat="tool"        class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-amber-400 border border-zinc-700 font-mono">tool</button>
    <button data-cat="mic"         class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-teal-400  border border-zinc-700 font-mono">mic</button>
    <button data-cat="status"      class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-400  border border-zinc-700 font-mono">status</button>
    <button data-cat="error"       class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-red-400   border border-zinc-700 font-mono">error</button>
    <button data-cat="event"       class="filter-chip text-xs px-1.5 py-px rounded-md bg-zinc-800 text-zinc-400  border border-zinc-700 font-mono">event</button>
    <div class="ml-auto flex items-center gap-1.5 text-xs text-zinc-500 hidden md:flex shrink-0">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="size-3" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/><path d="M12 16v-4M12 8h.01"/>
      </svg>
      Click row to toggle JSON
    </div>
  </div>

  <!-- ── Event Log ─────────────────────────────────────────────────────────── -->
  <main id="log-container" class="flex-1 overflow-y-auto">
    <div id="log-list" class="p-2 flex flex-col gap-px"></div>
    <div id="log-empty" class="flex flex-col items-center justify-center h-40 gap-2 text-zinc-600">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-8 opacity-40" aria-hidden="true">
        <path d="M12 2a3 3 0 0 1 3 3v6a3 3 0 0 1-6 0V5a3 3 0 0 1 3-3z"/>
        <path d="M19 10v1a7 7 0 0 1-14 0v-1M12 19v3M8 22h8"/>
      </svg>
      <span class="text-xs">Waiting for events…</span>
    </div>
  </main>

  <!-- ── Input Bar ─────────────────────────────────────────────────────────── -->
  <footer class="border-t border-zinc-800 p-3 shrink-0 bg-zinc-900/40">
    <div class="flex items-center gap-2">
      <input
        id="text-input"
        type="text"
        placeholder="Send a text message to the AI…"
        class="flex-1 bg-zinc-900 border border-zinc-700 rounded-lg h-9 px-3 text-sm placeholder:text-zinc-500 focus:border-zinc-500 focus:outline-none focus:ring-1 focus:ring-zinc-500 transition-colors duration-150"
      />
      <button id="btn-send"
        class="h-9 px-3 bg-indigo-600 hover:bg-indigo-500 active:scale-95 text-white rounded-lg text-sm font-medium transition-all duration-150 flex items-center gap-2 shrink-0">
        <!-- send icon -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="size-4" aria-hidden="true">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
        Send
      </button>
      <button id="btn-mic" title="Toggle microphone"
        aria-label="Toggle microphone"
        class="h-9 w-9 flex items-center justify-center rounded-lg border border-zinc-700 hover:bg-zinc-800 active:scale-95 transition-all duration-150 text-zinc-400 shrink-0">
      </button>
    </div>
    <p class="text-xs text-zinc-600 mt-2 leading-relaxed">
      <span id="audio-status"></span>
    </p>
  </footer>

  <script src="app.js"></script>
</body>
</html>
